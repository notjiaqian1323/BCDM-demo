<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCDS Secure Cloud - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./public/css/auth.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <i class="fa-solid fa-user-shield" style="color: var(--admin-bg);"></i>
        <h1>BCDS Admin Portal</h1>
    </div>

    <form id="admin-login-form" onsubmit="handleAdminAuth(event)">
        <div class="form-group">
            <label>Admin Email Address</label>
            <input type="email" id="admin-email" required placeholder="admin@bcds.local">
        </div>
        <div class="form-group">
            <label>Master Password</label>
            <input type="password" id="admin-password" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-admin" id="admin-submit">Authorize Access</button>

        <div class="admin-divider">
            <span>or</span>
        </div>

        <button type="button" class="btn" style="background-color: var(--text-muted);" onclick="window.location.href='login.html'">
            <i class="fa-solid fa-arrow-left"></i> Back to User Login
        </button>
    </form>

    <div id="error-message" class="error-msg"></div>
</div>

<script src="./public/js/main/admin_auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCDS Secure Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #2c3e50; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .switch-text { margin-top: 15px; font-size: 0.9rem; color: #666; cursor: pointer; text-decoration: underline; }
        .error { color: #e74c3c; margin-top: 10px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">🔐 Login</h1>
        <form id="authForm">
            <input type="text" id="username" placeholder="Username" style="display:none;">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
        </form>
        <p class="error" id="errorMsg"></p>
        <p class="switch-text" onclick="toggleMode()" id="switchBtn">Need an account? Register</p>
    </div>

    <script>
        let isRegister = false;

        function toggleMode() {
            isRegister = !isRegister;
            const title = document.getElementById('title');
            const submitBtn = document.getElementById('submitBtn');
            const switchBtn = document.getElementById('switchBtn');
            const userInput = document.getElementById('username');

            if (isRegister) {
                title.innerText = "📝 Register";
                submitBtn.innerText = "Create Account";
                switchBtn.innerText = "Have an account? Login";
                userInput.style.display = 'block';
                userInput.required = true;
            } else {
                title.innerText = "🔐 Login";
                submitBtn.innerText = "Sign In";
                switchBtn.innerText = "Need an account? Register";
                userInput.style.display = 'none';
                userInput.required = false;
            }
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;
            const errorMsg = document.getElementById('errorMsg');

            const endpoint = isRegister ? '/api/auth/register' : '/api/auth/login';
            const body = isRegister ? { username, email, password } : { email, password };

            try {
                console.log("🔵 Attempting login...", body); // Debug Log 1

                const res = await fetch(`http://localhost:5000${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await res.json();
                console.log("🟢 Server Response:", data); // Debug Log 2

                if (res.ok) {
                    localStorage.setItem('token', data.token);

                    // Optional Chaining (?.) prevents crash if 'user' is missing
                    const userRole = data.user?.role || data.role;

                    // --- 🚦 ENTERPRISE REDIRECT LOGIC ---
                    if (userRole === 'admin') {
                        // If Admin -> Go to the Command Center
                        console.log("🎩 Welcome Admin. Redirecting to Admin Panel...");
                        window.location.href = 'admin_panel.html';
                    } else {
                        // If User -> Go to Personal Dashboard
                        console.log("👤 Welcome User. Redirecting to Dashboard...");
                        window.location.href = 'dashboard.html';
                    }

                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = data.msg || 'Error occurred';
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Server Error";
            }
        });
    </script>
</body>
</html>

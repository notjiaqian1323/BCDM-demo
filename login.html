<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCDS Secure Cloud - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./public/css/auth.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <i class="fa-solid fa-shield-halved"></i>
            <h1>BCDS Secure Cloud</h1>
        </div>

        <div class="toggle-btns">
            <div class="toggle-btn active" onclick="switchForm('login')" id="btn-login">Sign In</div>
            <div class="toggle-btn" onclick="switchForm('register')" id="btn-register">Create Account</div>
        </div>

    <form id="login-form" onsubmit="handleAuth(event, 'login')">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn" id="login-submit">Secure Sign In</button>

        <div class="admin-divider">
            <span>or</span>
        </div>
        <button type="button" class="btn btn-admin" id="admin-redirect-btn">
            <i class="fa-solid fa-user-shield"></i> Admin Portal
        </button>
    </form>

        <form id="register-form" onsubmit="handleAuth(event, 'register')">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-username" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Create a strong password">
            </div>
            <button type="submit" class="btn" id="reg-submit">Create Account</button>
        </form>

        <div id="error-message" class="error-msg"></div>
    </div>

<script src="./public/js/main/auth.js"></script>
</body>
</html>

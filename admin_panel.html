<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCDS Security Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./public/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="header-hud">
    <div class="brand">
        🛡️ BCDS <span class="text-blue">COMMAND CENTER</span>
    </div>
    <div class="hud-stats-compact">
        <div class="hud-item-compact">
            <span class="pulse text-green">●</span>
            <span class="text-green font-bold" id="stat-system-status">OPERATIONAL</span>
        </div>

        <button class="btn-action btn-compact" id="btn-view-users" style="display: flex; gap: 8px; align-items: center;" title="View User Directory">
            <i class="fa-solid fa-chart-line text-blue"></i>
            <span id="stat-trend" class="text-green font-bold">+5.2%</span>
            <span style="color: var(--text-secondary);">Active Trend</span>
        </button>

        <button class="btn-logout-sleek" id="btn-logout">
            <i class="fa-solid fa-power-off"></i> LOGOUT
        </button>
    </div>
</header>

<div id="users-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
            <span>👥 System Directory (All Users)</span>
            <button id="btn-close-modal" class="btn-close">✖</button>
        </div>
        <div class="modal-body">
            <table class="watchlist-table">
                <thead>
                <tr>
                    <th>ID (Short)</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody id="all-users-list">
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="main-grid">

    <div class="left-column">

        <div class="panel" style="margin-bottom: 20px;">
            <div class="panel-header">
                📊 System Traffic (Last 24 Hours)
            </div>
            <div style="padding: 15px; height: 200px;">
                <canvas id="trafficChart"></canvas>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="pulse-red">●</span> Live Security Event Log
            </div>
            <div class="panel-toolbar">
                <div class="filter-group">
                    <i class="fa-solid fa-magnifying-glass text-secondary"></i>
                    <input type="text" id="logSearchInput" class="filter-input" placeholder="Search logs...">
                </div>

                <div class="filter-group">
                    <span class="hud-label" style="margin-bottom: 0;">Sort By:</span>
                    <select id="logSortSelect" class="filter-select">
                        <option value="recent">Most Recent (Default)</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>
            </div>
            <div class="live-feed-container" id="live-feed-container">
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            ⚠️ High-Risk Targets (Probation)
        </div>
        <div class="panel-toolbar">
            <div class="filter-group">
                <i class="fa-solid fa-magnifying-glass text-secondary"></i>
                <input type="text" id="userSearchInput" class="filter-input" placeholder="Search ID or Username...">
            </div>

            <div class="filter-group">
                <span class="hud-label" style="margin-bottom: 0;">Sort By:</span>
                <select id="userSortSelect" class="filter-select">
                    <option value="risk-high">Highest Risk (Default)</option>
                    <option value="risk-low">Lowest Risk</option>
                    <option value="recent">Most Recent</option>
                    <option value="status">Status (Banned First)</option>
                </select>
            </div>
        </div>
        <table class="watchlist-table">
            <thead>
            <tr>
                <th>User</th>
                <th>Score</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="user-table-body">
            </tbody>
        </table>
    </div>
</div>

<script type="module" src="./public/js/dashboard/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCDS Security Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./public/css/style.css">
</head>
<body>

<header class="header-hud">
    <div class="brand">
        🛡️ BCDS <span class="text-blue">COMMAND CENTER</span>
    </div>
    <div class="hud-stats">
        <div class="hud-item">
            <span class="hud-label">SYSTEM STATUS</span>
            <span class="hud-value text-green" id="stat-system-status">
                    <span class="pulse">●</span> CONNECTING...
                </span>
        </div>

        <div class="hud-item">
            <span class="hud-label">TOTAL USERS</span>
            <span class="hud-value" id="stat-total">-</span>
        </div>

        <div class="hud-item hud-alert">
            <span class="hud-label text-red">At-Risk ( < 50 )</span>
            <span class="hud-value text-red" id="stat-risk">-</span>
        </div>

        <button class="btn-logout" id="btn-logout">
            LOGOUT ADMIN
        </button>
    </div>
</header>

<div class="main-grid">

    <div class="panel">
        <div class="panel-header">
            <span class="pulse-red">●</span> Live Security Event Log
            <span style="font-size:0.7rem; opacity:0.7">Real-time Stream</span>
        </div>
        <div class="live-feed-container" id="live-feed-container">
            <div class="log-entry text-secondary">Waiting for stream...</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            ⚠️ High-Risk Targets (Probation)
        </div>
        <table class="watchlist-table">
            <thead>
            <tr>
                <th>User</th>
                <th>Score</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="user-table-body">
            </tbody>
        </table>

        <div class="panel-footer">
            <button class="btn-action" style="width:100%" id="btn-view-ledger">
                📄 View Full Blockchain Ledger
            </button>
        </div>
    </div>
</div>

<script type="module" src="./public/js/dashboard/main.js"></script>
</body>
</html>
